<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <header class="header-container">
        <nav class="nav-container">
            <div class="logo-titulo">
                <img src="{{ url_for('static', filename='img/pokeball.png') }}" alt="pokeball">
                <h1>Pokédex</h1>
            </div>

            <p class="subtitulo">Todos los Pokémon</p>

            <div class="botones">
                <button class="btn-azul">
                    <i class="bi bi-list-task"></i> Ver todos
                </button>
                <button class="btn-verde">
                    <i class="bi bi-funnel-fill"></i> Ver 5 primeros
                </button>
            </div>
        </nav>
    </header>

    <main class="contenedor-cards">

        {% for pokemon in pokedex %}
        {% set tipos = pokemon.tipo.split('/') %}

        <div class="card">

            <div class="imagen">
                <span class="numero">#{{ pokemon.id }}</span>
                <img src="{{ url_for('static', filename='img/' + pokemon.imagen) }}">
            </div>

            <div class="contenido">

                <h2>{{ pokemon.nombre }}</h2>

                <div class="tipos">
                    {% for t in tipos %}
                        <span class="tipo-badge tipo-{{ t | trim | lower | replace('é','e') }}">{{ t }}</span>
                    {% endfor %}
                </div>

                <div class="poder">
                    <p>⚡ Poder</p>
                    <div class="barra">
                        <div class="progreso">
                            {{ pokemon.poder }}
                        </div>
                    </div>
                </div>

                <div class="datos">
                    <div>
                        <p>Altura</p>
                        <strong>{{ pokemon.altura }}</strong>
                    </div>
                    <div>
                        <p>Peso</p>
                        <strong>{{ pokemon.peso }}</strong>
                    </div>
                </div>

                <button class="detalle">Ver detalles</button>

            </div>
        </div>
        {% endfor %}
    </main>
</body>
</html>
